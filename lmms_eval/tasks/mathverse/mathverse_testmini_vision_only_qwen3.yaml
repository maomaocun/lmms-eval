dataset_path: CaraJ/MathVerse-lmmseval
dataset_name: testmini_version_split
dataset_kwargs:
  token: False
task: "mathverse_testmini_vision_only_qwen3"
test_split: vision_only
output_type: generate_until
doc_to_visual: !function utils_qwen3.mathverse_doc_to_visual_qwen3
doc_to_text: !function utils_qwen3.mathverse_doc_to_text_qwen3
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 49152
process_results: !function utils_qwen3.mathverse_qwen3_process_results
metric_list:
  - metric: gpt_eval_score
    aggregation: !function utils_qwen3.mathverse_qwen3_aggregate_results_eval
    higher_is_better: true
  - metric: submission
    aggregation: !function utils_qwen3.mathverse_qwen3_aggregate_results_submission
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    shot_type: "format-prompt"
    query_type: "query_wo"
    min_pixels: 1003520
    max_pixels: 4014080
model_specific_generation_kwargs:
  llava:
    image_aspect_ratio: original
