dataset_path: MathLLMs/MathVision
dataset_kwargs:
  token: True
task: "mathvision_reason_test_qwen3"
test_split: test
output_type: generate_until
doc_to_target: "answer"

# Use Qwen3-VL optimized functions
doc_to_messages: !function lmms_eval.tasks.mathvision.utils_qwen3.mathvision_reason_doc_to_messages_qwen3
doc_to_text: !function lmms_eval.tasks.mathvision.utils_qwen3.mathvision_reason_doc_to_text_qwen3
doc_to_visual: !function lmms_eval.tasks.mathvision.utils_qwen3.mathvision_reason_doc_to_visual_qwen3

process_results: !function lmms_eval.tasks.mathvision.utils_qwen3.mathvision_reason_qwen3_process_results

metric_list:
  - metric: acc_score
    aggregation: mean
    higher_is_better: true
  - metric: format_score
    aggregation: mean
    higher_is_better: true

generation_kwargs:
  max_new_tokens: 49152

lmms_eval_specific_kwargs:
  default:
    format: "qwen3_vl"
    # Reasoning prompt appended to the question to trigger step-by-step reasoning
    post_prompt: "Think step by step before answering."
    # Official image resolution settings (match Qwen3-VL official repo)
    min_pixels: 1003520  # 1280*28*28 (~1M pixels)
    max_pixels: 4014080  # 5120*28*28 (~4M pixels)
