dataset_path: AI4Math/MathVista
dataset_kwargs:
  token: True
task: "mathvista_test_reasoning_qwen3"
test_split: test
output_type: generate_until
doc_to_visual: !function lmms_eval.tasks.mathvista.utils_qwen3.mathvista_reason_doc_to_visual_qwen3
doc_to_text: !function lmms_eval.tasks.mathvista.utils_qwen3.mathvista_reason_doc_to_text_qwen3
doc_to_messages: !function lmms_eval.tasks.mathvista.utils_qwen3.mathvista_reason_doc_to_messages_qwen3
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 49152
process_results: !function lmms_eval.tasks.mathvista.utils_qwen3.mathvista_reason_qwen3_process_results
metric_list:
  - metric: acc_score
    aggregation: mean
    higher_is_better: true
  - metric: format_score
    aggregation: mean
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    shot_type: "reason-first"
    shot: 0
    use_caption: False
    use_ocr: False
    system_prompt: "You are a helpful assistant. When the user asks a question, your response must include two parts: first, the reasoning process enclosed in <think>...</think> tags, then the final answer enclosed in <answer>...</answer> tags. Please provide a clear, concise response within <answer> </answer> tags that directly addresses the question."
    min_pixels: 1003520
    max_pixels: 4014080
