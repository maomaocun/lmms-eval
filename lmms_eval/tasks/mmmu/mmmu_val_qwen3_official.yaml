dataset_path: lmms-lab/MMMU
task: "mmmu_val_qwen3_official"
test_split: validation
output_type: generate_until
doc_to_visual: !function utils_qwen3_official.mmmu_doc_to_visual
doc_to_text: !function utils_qwen3_official.mmmu_doc_to_text
doc_to_target: "answer"
doc_to_messages: !function utils_qwen3_official.mmmu_doc_to_messages
# Use official evaluation logic with GPT judge fallback
process_results: !function utils_qwen3_official.mmmu_process_results_official

metric_list:
  - metric: mmmu_acc_official
    aggregation: !function utils_qwen3_official.mmmu_aggregate_results_official
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    format: "qwen3_vl"
    pre_prompt: ""
    post_prompt: "Please select the correct answer from the options above."
    open_ended_prompt: "Please answer the question directly."
    # Official image resolution settings (match Qwen3-VL official repo)
    min_pixels: 1003520  # 1280*28*28 (~1M pixels)
    max_pixels: 4014080  # 5120*28*28 (~4M pixels)

include: _default_template_yaml
