dataset_path: MMMU/MMMU_Pro
dataset_name: "standard (10 options)"
task: "mmmu_pro_standard_reasoning_qwen3_official"
test_split: test
output_type: generate_until
doc_to_visual: !function ../utils_qwen3_official.mmmu_pro_doc_to_visual
doc_to_text: !function ../utils_qwen3_official.mmmu_pro_doc_to_text
doc_to_target: "answer"
# Use official evaluation logic with GPT judge fallback
process_results: !function ../utils_qwen3_official.mmmu_pro_process_results_official

generation_kwargs:
  max_new_tokens: 49152

metric_list:
  - metric: mmmu_pro_acc_official
    aggregation: !function ../utils_qwen3_official.mmmu_pro_aggregate_results_official
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    format: "qwen3_vl"
    pre_prompt: ""
    post_prompt: "Answer the following multiple choice question. The last line of your response should be of the following format: 'Answer: $LETTER' (without quotes) where LETTER is one of options. Think step by step before answering."
    # Official image resolution settings (match Qwen3-VL official repo)
    min_pixels: 1003520  # 1280*28*28 (~1M pixels)
    max_pixels: 4014080  # 5120*28*28 (~4M pixels)

include: ../_default_template_yaml
