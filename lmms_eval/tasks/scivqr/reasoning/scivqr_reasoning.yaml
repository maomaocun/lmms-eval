dataset_path: l205/SciVQR
task: scivqr_reasoning
dataset_kwargs:
  token: True
test_split: train
process_docs: !function utils.scivqr_process_docs_reasoning
output_type: generate_until
doc_to_visual: !function utils.scivqr_doc_to_visual
doc_to_text: !function utils.scivqr_doc_to_text
doc_to_messages: !function utils.scivqr_doc_to_messages
doc_to_target: !function utils.scivqr_doc_to_target
process_results: !function utils.scivqr_reasoning_process_results

metric_list:
  - metric: scivqr_reasoning
    aggregation: !function utils.scivqr_reasoning_aggregate_scores
    higher_is_better: true

generation_kwargs:
  max_new_tokens: 49152

metadata:
  version: 0.0
