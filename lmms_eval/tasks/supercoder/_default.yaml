dataset_path: LLM4Code/llm_superoptimizer_ds
output_type: generate_until

doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target

generation_kwargs:
  max_new_tokens: 4096
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false

process_results: !function utils.process_results

metric_list:
  - metric: correctness
    aggregation: !function utils.aggregate_correctness
    higher_is_better: true
  - metric: speedup
    aggregation: !function utils.aggregate_speedup_geomean
    higher_is_better: true
  - metric: fast_1
    aggregation: !function utils.aggregate_fast_1
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

metadata:
  - version: 0.1
  - paper_url: "https://arxiv.org/abs/2505.11480"
  - upstream_repo: "https://github.com/Anjiang-Wei/SuperCoder"
